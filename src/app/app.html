<div class="app-container">
  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" *ngIf="isSidebarOpen()" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar glass-panel" [class.open]="isSidebarOpen()">
    <div class="sidebar-header">
      <h2>🏆 Copa 2026</h2>
      <button class="close-btn" (click)="closeSidebar()">✕</button>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeSidebar()">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/classificacao" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">📈</span> Classificação
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <header class="app-header glass-panel">
      <button class="menu-btn" (click)="toggleSidebar()">
        <span>☰</span>
      </button>
      
      <div class="header-actions">
        <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Alternar tema'">
          <span class="icon">{{ isDarkMode() ? '☀️' : '🌙' }}</span>
        </button>
      </div>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
