<div class="app-container">
  <!-- Mobile Overlay -->
  @if (isSidebarOpen()) {
    <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside class="sidebar glass-panel" [class.open]="isSidebarOpen()">
    <div class="sidebar-header">
      <h2>🏆 Copa 2026</h2>
      <button class="close-btn" (click)="closeSidebar()">✕</button>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeSidebar()"
      >
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/classificacao" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">📈</span> Classificação
      </a>
    </nav>
    <div
      class="sidebar-footer"
      style="
        margin-top: auto;
        padding: 1.5rem;
        display: flex;
        justify-content: center;
        gap: 1rem;
        border-top: 1px solid var(--glass-border);
      "
    >
      <!-- PWA Install Button -->
      @if (canInstall()) {
        <button class="install-pwa-btn" (click)="installPwa()">📲 Instalar App</button>
      }

      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Alternar tema'">
        @if (isDarkMode()) {
          <span class="icon">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
              />
            </svg>
          </span>
        }
        @if (!isDarkMode()) {
          <span class="icon">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </span>
        }
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div
      class="floating-actions"
      style="
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 40;
        display: flex;
        gap: 0.75rem;
      "
    >
      <button class="menu-btn mobile-only" (click)="toggleSidebar()">
        <span>☰</span>
      </button>
    </div>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
