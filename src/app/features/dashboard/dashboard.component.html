<div class="container">
  <header class="dashboard-header glass-panel">
    <div class="logo">
      <h1>Copa do Mundo 2026</h1>
    </div>
    <div class="stats">
      <div class="stat-box">
        <span class="label">Total de Jogos</span>
        <span class="value">{{ matches().length }}</span>
      </div>
      <div class="stat-box">
        <span class="label">Encerrados</span>
        <span class="value">{{ completedMatches() }}</span>
      </div>
      <div class="stat-box">
        <span class="label">Concluídos (%)</span>
        <span class="value">{{ completedPercentage() }}</span>
      </div>
    </div>
  </header>

  <main class="dashboard-content">
    @if (loading()) {
      <div class="loader-container">
        <div class="spinner"></div>
        <p>Carregando dados da FIFA...</p>
      </div>
    }

    @if (!loading()) {
      <app-match-list
        [matches]="matches()"
        [uiResources]="uiResources()"
        (matchClicked)="onMatchSelected($event)"
      ></app-match-list>
    }

    @if (selectedMatch()) {
      <app-match-detail-modal
        [match]="selectedMatch()"
        (close)="closeModal()"
      ></app-match-detail-modal>
    }
  </main>
</div>
