<div class="container">
  <header class="page-header glass-panel">
    <h1>{{ i18n.t().matches.title }}</h1>
    <p>{{ i18n.t().matches.subtitle }}</p>
  </header>

  <main class="dashboard-content">
    @if (loading()) {
      <div class="loader-container">
        <div class="spinner"></div>
        <p>{{ i18n.t().dashboard.loading }}</p>
      </div>
    }

    @if (!loading()) {
      <app-match-list
        [matches]="mergedMatches()"
        [uiResources]="uiResources()"
        (matchClicked)="onMatchSelected($event)"
        (teamClicked)="onTeamSelected($event)"
      ></app-match-list>
    }

    @if (selectedMatch()) {
      <app-match-detail-modal
        [match]="selectedMatch()"
        (closeModal)="closeModal()"
      ></app-match-detail-modal>
    }

    @if (selectedTeamId()) {
      <app-team-detail-modal
        [teamId]="selectedTeamId()"
        [teamName]="selectedTeamName()"
        [teamCountryCode]="selectedTeamCountryCode()"
        (closeModal)="closeTeamDetail()">
      </app-team-detail-modal>
    }
  </main>
</div>
