<div class="filters">
  <div class="filter-selects">
    <select
      class="filter-dropdown glass-panel"
      [value]="activeFilter()"
      (change)="setStatusFilter($event)"
    >
      <option value="ALL">{{ i18n.t().filters.all }}</option>
      <option value="LIVE">{{ i18n.t().filters.live }}</option>
      <option value="UPCOMING">{{ i18n.t().filters.upcoming }}</option>
      <option value="FINISHED">{{ i18n.t().filters.finished }}</option>
    </select>

    <select
      class="filter-dropdown glass-panel"
      [value]="selectedStage()"
      (change)="setStageFilter($event)"
    >
      <option value="ALL">{{ i18n.t().filters.stage }}</option>
      @for (stage of availableStages(); track stage) {
        <option [value]="stage">{{ stage }}</option>
      }
    </select>

    <select
      class="filter-dropdown glass-panel"
      [value]="selectedGroup()"
      (change)="setGroupFilter($event)"
    >
      <option value="ALL">{{ i18n.t().filters.group }}</option>
      @for (group of availableGroups(); track group) {
        <option [value]="group">{{ group }}</option>
      }
    </select>

    <select
      class="filter-dropdown glass-panel"
      [value]="selectedContinent()"
      (change)="setContinentFilter($event)"
    >
      <option value="ALL">{{ i18n.t().filters.continent }}</option>
      @for (continent of availableContinents(); track continent) {
        <option [value]="continent">{{ i18n.t().continents[continent] || continent }}</option>
      }
    </select>

    <select
      class="filter-dropdown glass-panel"
      [value]="selectedTeam()"
      (change)="setTeamFilter($event)"
    >
      <option value="ALL">{{ i18n.t().filters.team }}</option>
      @for (team of availableTeams(); track team) {
        <option [value]="team">{{ team }}</option>
      }
    </select>
  </div>

  <div
    class="filter-actions"
    style="display: flex; justify-content: flex-end; margin-top: 0.5rem; gap: 0.5rem"
  >
    <button 
      class="sort-btn glass-panel" 
      (click)="toggleDefinedTeams()" 
      [title]="onlyDefinedTeams() ? i18n.t().filters.definedTitleOnly : i18n.t().filters.definedTitleAll"
      [class.active]="onlyDefinedTeams()"
    >
      <span class="icon">{{ onlyDefinedTeams() ? '✔️' : '⭕' }}</span> 
      {{ onlyDefinedTeams() ? i18n.t().filters.definedOnly : i18n.t().filters.definedShowAll }}
    </button>
    <button class="sort-btn glass-panel" (click)="toggleSortOrder()" [title]="sortOrder() === 'ASC' ? i18n.t().filters.sortTitleOldest : i18n.t().filters.sortTitleNewest">
      <span class="icon">↕️</span> {{ sortOrder() === 'ASC' ? i18n.t().filters.sortOldest : i18n.t().filters.sortNewest }}
    </button>
    @if (hasActiveFilters()) {
      <button class="clear-filters-btn" (click)="clearFilters()">✕ {{ i18n.t().filters.clear }}</button>
    }
  </div>
</div>

<div class="match-grid">
  @for (m of filteredMatches(); track m) {
    <app-match-card
      [match]="m"
      [uiResources]="uiResources"
      (matchClicked)="onMatchClick($event)"
    ></app-match-card>
  }
</div>

@if (filteredMatches().length === 0) {
  <div class="empty-state glass-panel">
    <div class="empty-icon">⚽</div>
    <h3>{{ i18n.t().filters.noMatches }}</h3>
  </div>
}
