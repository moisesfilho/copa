name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright Binaries
        id: cache-playwright
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-binaries-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Restore node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Lint Code
        run: |
          echo "### 🧹 ESLint Report" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          npm run lint >> $GITHUB_STEP_SUMMARY 2>&1 || LINT_FAILED=true
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$LINT_FAILED" = "true" ]; then exit 1; fi

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Restore node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Run Unit Tests
        run: npm test -- --watch=false --coverage --reporters=junit --output-file=test-results/junit-unit.xml

      - name: Test Report (Unit)
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Angular Unit Tests
          path: test-results/junit-unit.xml
          reporter: jest-junit

  e2e:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Restore node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

      - name: Restore Playwright Binaries
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-binaries-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright OS Dependencies
        run: npx playwright install-deps

      - name: Run E2E Tests
        run: PLAYWRIGHT_JUNIT_OUTPUT_NAME=test-results/junit-e2e.xml npx playwright test --reporter=html,junit

      - name: Test Report (E2E)
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Playwright E2E Tests
          path: test-results/junit-e2e.xml
          reporter: java-junit

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Restore node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Build
        run: npx ng build

      - name: Setup GitHub Pages SPA routing (404.html fallback)
        run: cp dist/copa/browser/index.html dist/copa/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'dist/copa/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
